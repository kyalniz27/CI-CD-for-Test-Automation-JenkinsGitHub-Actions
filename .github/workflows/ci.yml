name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  unit-tests-backend:
    runs-on: ubuntu-latest
    outputs:
      coverage-report: ${{ steps.test-backend.outputs.report }}
    steps:
      - uses: actions/checkout@v3
      - name: Set up Go
        uses: actions/setup-go@v3
        with:
          go-version: 1.21
          cache-dependency-path: ./bugtracker-backend/go.sum
      - name: Install go-junit-report
        run: go install github.com/jstemmer/go-junit-report/v2@latest

      - name: Execute Backend Unit Tests
        id: test-backend
        working-directory: ./bugtracker-backend
        run: |
          go test -json -coverprofile=coverage.out -covermode=atomic ./...
          go tool cover -func=coverage.out > coverage.txt

          echo "## Backend Test Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat coverage.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          echo "report <<EOF" >> $GITHUB_OUTPUT
          cat coverage.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          go test -v ./... 2>&1 | go-junit-report > test-results.xml

      - name: Publish Test Results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: backend-test-results
          path: ./bugtracker-backend/test-results.xml
          reporter: jest-junit

  unit-tests-frontend:
    # needs: unit-tests-backend
    runs-on: ubuntu-latest
    outputs:
      coverage-report: ${{ steps.test-frontend.outputs.report }}
    steps:
      - uses: actions/checkout@v3
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: "npm"
          cache-dependency-path: ./bugtracker-frontend/package-lock.json
      - name: Execute Frontend Unit Tests
        id: test-frontend
        working-directory: ./bugtracker-frontend
        run: |
          npm ci
          npm test | tee full_output.txt

          echo "## Frontend Test Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat full_output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          echo "report <<EOF" >> $GITHUB_OUTPUT
          cat full_output.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Publish Test Results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: frontend-test-results
          path: ./bugtracker-frontend/test-results.xml
          reporter: jest-junit

  create-coverage-comment:
    if: github.event_name == 'pull_request' && always()
    needs: [unit-tests-backend, unit-tests-frontend]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Create Backend Coverage Comment
        uses: peter-evans/create-or-update-comment@v2
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ## Backend Test Coverage Report
            ```
            ${{ needs.unit-tests-backend.outputs.report }}
            ```
      - name: Create Frontend Coverage Comment
        uses: peter-evans/create-or-update-comment@v2
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ## Frontend Test Coverage Report
            ```
            ${{ needs.unit-tests-frontend.outputs.report }}
            ```

  api-e2e-tests:
    needs: [unit-tests-backend, unit-tests-frontend]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Launch application
        run: |
          docker compose up --build -d
          npx wait-port http://localhost:8080/api/health --timeout=30000

      - name: Run API Tests
        working-directory: ./tests-api
        env: 
          CI: "1"
        run: |
          npm ci
          npx playwright install
          npx playwright test

      - name: Run E2E Tests
        working-directory: ./tests-e2e
        run: |
          npm ci
          npx playwright test

      - name: Shut Down Application
        run: docker compose down

      - name: Publish API Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-test-results
          path: ./tests-api/test-results/
          retention-days: 30

      - name: Publish API Test Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-test-playwright-report
          path: ./tests-api/playwright-report/
          retention-days: 30

      - name: Publish API Test Results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: API Test Report
          path: ./tests-api/test-results/*.xml
          reporter: jest-junit
